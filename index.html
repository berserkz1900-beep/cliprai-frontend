<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLIPR.AI | Free Opus Clip Alternative</title>
    <meta name="theme-color" content="#050508">
    <link rel="manifest" href="data:application/manifest+json,{'name':'CLIPR.AI','short_name':'CLIPR','start_url':'.','display':'standalone','background_color':'#050508','theme_color':'#00ff64'}">
    <style>
        :root {
            --bg: #050508;
            --accent: #00ff64;
            --text: #ffffff;
            --gray: #1a1a24;
            --border: #2d2d3d;
            --font: 'Courier New', Courier, monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            margin: 0;
            padding: 0;
            line-height: 1.4;
            overflow-x: hidden;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 8, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: bold; font-size: 1.2rem; color: var(--accent); letter-spacing: -1px; }
        .badge { background: #1a1a24; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; border: 1px solid var(--border); }
        .nav-btns { display: flex; gap: 10px; }
        .icon-btn { background: none; border: 1px solid var(--border); color: white; cursor: pointer; padding: 6px 10px; border-radius: 4px; }

        main { padding: 16px; max-width: 600px; margin: 0 auto; min-height: 100vh; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #888; text-transform: uppercase; }
        input, select {
            width: 100%;
            background: var(--gray);
            border: 1px solid var(--border);
            padding: 14px;
            color: white;
            font-family: var(--font);
            border-radius: 4px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-family: var(--font);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .btn-primary { background: var(--accent); color: black; }
        .btn-secondary { background: var(--gray); color: white; border: 1px solid var(--border); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .pill-box { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .pill { 
            background: var(--gray); 
            border: 1px solid var(--border); 
            padding: 6px 12px; 
            border-radius: 20px; 
            font-size: 0.7rem; 
            cursor: pointer;
        }
        .pill.active { border-color: var(--accent); color: var(--accent); }

        .status-bar { 
            background: #001a0a; 
            border: 1px solid #003314; 
            color: var(--accent); 
            padding: 10px; 
            font-size: 0.8rem; 
            border-radius: 4px; 
            margin-bottom: 20px;
            display: none;
        }

        .clip-tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 15px; padding-bottom: 5px; }
        .clip-tab { 
            padding: 10px; 
            background: var(--gray); 
            border: 1px solid var(--border); 
            min-width: 100px; 
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .clip-tab.active { border-color: var(--accent); color: var(--accent); background: #001a0a; }

        .clip-card { background: var(--gray); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
        .clip-header { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }

        .sub-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        .sub-tab { padding: 8px 12px; font-size: 0.7rem; color: #888; cursor: pointer; white-space: nowrap; }
        .sub-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .progress-container { margin: 20px 0; background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

        .modal { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
            display: none; padding: 20px; overflow-y: auto;
        }
        .modal-content { 
            background: var(--gray); border: 1px solid var(--border); 
            padding: 20px; border-radius: 8px; max-width: 500px; margin: 40px auto; 
        }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: black; padding: 8px 16px; 
            border-radius: 4px; font-weight: bold; display: none; z-index: 2000;
        }

        pre { background: black; padding: 10px; border-radius: 4px; white-space: pre-wrap; font-size: 0.8rem; border: 1px solid var(--border); }
        .big-ts { font-size: 1.5rem; font-weight: bold; color: var(--accent); display: block; margin: 10px 0; }
        .box { background: #001a0a; border: 1px solid #003314; padding: 12px; border-radius: 4px; margin-bottom: 10px; }
        
        .loading-spinner { 
            width: 20px; height: 20px; border: 2px solid var(--accent); 
            border-top: 2px solid transparent; border-radius: 50%; 
            animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CLIPR.AI</div>
        <div class="nav-btns">
            <span class="badge">CLAUDE AI</span>
            <button class="icon-btn" onclick="openModal('history-modal')">🕐</button>
            <button class="icon-btn" onclick="openModal('keys-modal')">🔑</button>
        </div>
    </header>

    <main id="app">
        <div id="screen-input">
            <div class="input-group">
                <label>YouTube URL</label>
                <input type="text" id="yt-url" placeholder="https://youtube.com/watch?v=..." oninput="autoFetchIfValid(this.value)">
            </div>

            <button class="btn btn-secondary" id="fetch-btn" onclick="fetchTranscript()">📄 FETCH TRANSCRIPT</button>

            <div id="status-bar" class="status-bar"></div>

            <div class="input-group">
                <label>Topic / Title</label>
                <input type="text" id="topic-title" placeholder="Loading from video...">
            </div>

            <label>Niche</label>
            <div class="pill-box" id="niche-pills">
                <div class="pill active">Finance & Investing</div>
                <div class="pill">Entrepreneurship</div>
                <div class="pill">Self Improvement</div>
                <div class="pill">AI & Tech</div>
                <div class="pill">Real Estate</div>
                <div class="pill">Side Hustles</div>
            </div>

            <label>Quick Source</label>
            <div class="pill-box" id="source-pills">
                <div class="pill">Iced Coffee Hour</div>
                <div class="pill">My First Million</div>
                <div class="pill">Graham Stephan</div>
                <div class="pill">Mark Tilbury</div>
                <div class="pill">Humphrey Yang</div>
                <div class="pill">Diary of a CEO</div>
            </div>

            <button class="btn btn-primary" id="find-clips-btn" onclick="findViralClips()" disabled>✂️ FIND VIRAL CLIPS</button>
        </div>

        <div id="screen-results" class="hidden">
            <button class="btn btn-secondary" onclick="showScreen('input')" style="width: auto; padding: 8px 15px; margin-bottom: 15px;">← BACK</button>
            <div id="clip-tabs-container" class="clip-tabs"></div>
            <div id="active-clip-content"></div>
        </div>
    </main>

    <div id="keys-modal" class="modal">
        <div class="modal-content">
            <h3>🔑 API SETTINGS</h3>
            <div class="input-group">
                <label>Groq API Key</label>
                <input type="password" id="groq-key-input">
            </div>
            <div class="input-group">
                <label>Supadata API Key</label>
                <input type="password" id="supadata-key-input">
            </div>
            <button class="btn btn-primary" onclick="saveKeys()">SAVE SETTINGS</button>
            <button class="btn btn-secondary" onclick="closeModal('keys-modal')">CLOSE</button>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h3>🕐 HISTORY</h3>
            <div id="history-list"></div>
            <button class="btn btn-secondary" onclick="closeModal('history-modal')" style="margin-top: 15px;">CLOSE</button>
        </div>
    </div>

    <div id="toast">Copied to clipboard!</div>

    <script>
        const BACKEND_URL = "https://cliprai-backend4.onrender.com";
        const KEYWORDS = ["$","million","thousand","broke","lost","mistake","secret","truth","nobody","quit","fired","scam","lie","wrong","shocked","rich","poor","debt","failed","regret","wish","actually","honest","never told","they don't want","wake up","stop buying","I was wrong","biggest mistake","almost quit","lost everything","made me rich","changed my life"];
        
        let state = {
            transcript: null,
            duration: 0,
            title: '',
            videoId: '',
            clips: [],
            currentClipIdx: 0,
            processing: false
        };

        window.onload = () => {
            loadKeys();
            setupPills();
            if (!localStorage.getItem('groq_key')) {
                openModal('keys-modal');
            }
            renderHistory();
        };

        function setupPills() {
            document.querySelectorAll('.pill-box .pill').forEach(pill => {
                pill.onclick = () => {
                    pill.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                }
            });
        }

        function loadKeys() {
            document.getElementById('groq-key-input').value = localStorage.getItem('groq_key') || '';
            document.getElementById('supadata-key-input').value = localStorage.getItem('supadata_key') || '';
        }

        function saveKeys() {
            localStorage.setItem('groq_key', document.getElementById('groq-key-input').value);
            localStorage.setItem('supadata_key', document.getElementById('supadata-key-input').value);
            showToast("Keys saved!");
            closeModal('keys-modal');
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; if(id==='history-modal') renderHistory(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        // Copies text to clipboard and shows a toast confirmation.
        function copyText(text) {
            if (!text) return;
            const doCopy = () => showToast("Copied to clipboard!");
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(doCopy).catch(() => fallbackCopy(text, doCopy));
            } else {
                fallbackCopy(text, doCopy);
            }
        }

        function fallbackCopy(text, cb) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try { document.execCommand('copy'); cb(); } catch (e) { console.error('Copy failed', e); }
            document.body.removeChild(ta);
        }

        // Enables the transcript fetch button only once a plausible YouTube URL is entered.
        function autoFetchIfValid(value) {
            const isValidYouTube = /^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/)[\w-]{11}/.test(value.trim());
            document.getElementById('fetch-btn').disabled = false; // always allow manual fetch
            document.getElementById('fetch-btn').style.opacity = isValidYouTube ? '1' : '0.7';
        }

        function showScreen(screen) {
            document.getElementById('screen-input').classList.toggle('hidden', screen !== 'input');
            document.getElementById('screen-results').classList.toggle('hidden', screen !== 'results');
        }

        function updateStatus(msg, isError = false) {
            const sb = document.getElementById('status-bar');
            sb.style.display = 'block';
            sb.style.color = isError ? '#ff4444' : 'var(--accent)';
            sb.style.borderColor = isError ? '#440000' : '#003314';
            sb.innerHTML = msg;
        }

        async function fetchTranscript() {
            const url = document.getElementById('yt-url').value;
            if (!url) return alert("Paste a URL first");
            
            const btn = document.getElementById('fetch-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> FETCHING...';
            updateStatus("Connecting to transcript engine...");

            try {
                const res = await fetch(`${BACKEND_URL}/transcript`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                
                if (data.success) {
                    state.transcript = data.transcript;
                    state.duration = data.duration;
                    state.title = data.title;
                    state.videoId = data.videoId;
                    
                    document.getElementById('topic-title').value = data.title;
                    updateStatus(`✅ SUCCESS: Loaded ${data.transcript.length} segments. Duration: ${Math.round(data.duration)}s`);
                    document.getElementById('find-clips-btn').disabled = false;
                } else {
                    updateStatus("❌ Error: " + data.error, true);
                }
            } catch (e) {
                updateStatus("❌ Connection failed to backend", true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📄 FETCH TRANSCRIPT';
            }
        }

        function keywordScan() {
            const matches = [];
            const segments = state.transcript;
            
            for (let i = 0; i < segments.length; i++) {
                const text = segments[i].text.toLowerCase();
                const hasKeyword = KEYWORDS.some(k => text.includes(k.toLowerCase()));
                
                if (hasKeyword) {
                    const startIdx = Math.max(0, i - 3);
                    const endIdx = Math.min(segments.length - 1, i + 3);
                    const context = segments.slice(startIdx, endIdx + 1)
                        .map(s => `[${Math.round(s.offset)}s] ${s.text}`)
                        .join(" ");
                    matches.push(context);
                    i = endIdx;
                }
            }
            return matches.slice(0, 15).join("\n\n");
        }

        async function findViralClips() {
            const groqKey = localStorage.getItem('groq_key');
            if (!groqKey) return openModal('keys-modal');

            const btn = document.getElementById('find-clips-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> ANALYZING VIRAL POTENTIAL...';
            
            const context = keywordScan();
            const prompt = `You are the world's best viral short-form content editor for US/UK finance audiences on Instagram Reels and YouTube Shorts.

For each clip, find ONE single continuous segment from the video — do not combine timestamps from different parts of the video. The segment's first 3-5 seconds must function as a strong hook on their own, and the segment must be a complete, coherent, self-contained moment from start to finish.

US/UK PSYCHOLOGY TRIGGERS:
- SYSTEM_EXPOSE: Banks/institutions hiding truth
- WEALTH_GAP: Rich vs poor anger
- COUNTERINTUITIVE: Against common advice
- RELATABLE_STRUGGLE: Validates financial pain
- FAILURE_SUCCESS: Vulnerability + comeback
- INSIDER_SECRET: Hidden knowledge
- ANGER_HOPE: Broken system + way out

PLATFORM RULES:
- Instagram: segment duration MUST be under 30 seconds total
- YouTube: segment duration MUST be under 60 seconds total
- Alternate platforms between clips

VIDEO DURATION: ${state.duration}
ALL timestamps MUST be within video duration and MUST form one continuous, uninterrupted window (endSeconds - startSeconds = totalSeconds, no gaps).

Here are the high-signal moments found in the transcript, with surrounding context:
${context}

Return ONLY this exact JSON structure, no markdown:
{
  "videoTitle": "${state.title.replace(/"/g, "'")}",
  "clips": [
    {
      "id": 1,
      "platform": "INSTAGRAM",
      "emotion": "SHOCKED",
      "trigger": "SYSTEM_EXPOSE",
      "viralScore": 9,
      "whyViral": "one sentence explaining why",
      "totalSeconds": 27,
      "hookText": "ALL CAPS MAX 6 WORDS",
      "subHook": "max 8 words",
      "segment": {
        "timestamp": "MM:SS - MM:SS",
        "startSeconds": 0,
        "endSeconds": 27,
        "durationSeconds": 27,
        "text": "exact words spoken across the full segment",
        "what": "what this moment is about"
      },
      "captions": ["line1","line2","line3","line4","line5","line6","line7","line8"],
      "instagramCaption": "3-4 sentences with emojis + strong CTA for US/UK audience",
      "hashtags": ["personalfinance","moneytips","financialfreedom","investing"],
      "youtubeTitle": "under 60 chars using US/UK psychology trigger",
      "capcut": "numbered step by step assembly instructions",
      "bestPostTime": "7:30 AM NPT",
      "platformTip": "one tip for US/UK reach on this platform"
    }
  ]
}`;

            try {
                const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${groqKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [{ role: 'user', content: prompt }]
                    })
                });
                const data = await res.json();

                if (data.error) {
                    throw new Error(data.error.message || 'Groq API error');
                }

                const rawText = data.choices[0].message.content;
                const cleanText = rawText.replace(/```json|```/g, '').trim();
                const parsed = JSON.parse(cleanText);

                state.clips = parsed.clips;
                state.currentClipIdx = 0;
                saveToHistory(state.title, state.videoId, parsed.clips.length);

                renderClipTabs();
                renderActiveClip();
                showScreen('results');
            } catch (e) {
                console.error(e);
                alert("Failed to analyze clips. Check your Groq key and try again.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✂️ FIND VIRAL CLIPS';
            }
        }

        function renderClipTabs() {
            const container = document.getElementById('clip-tabs-container');
            container.innerHTML = state.clips.map((c, i) => `
                <div class="clip-tab ${i === state.currentClipIdx ? 'active' : ''}" onclick="selectClip(${i})">
                    CLIP ${i + 1}<br>${c.platform}<br>⭐${c.viralScore}/10
                </div>
            `).join('');
        }

        function selectClip(idx) {
            state.currentClipIdx = idx;
            renderClipTabs();
            renderActiveClip();
        }

        function renderActiveClip() {
            const clip = state.clips[state.currentClipIdx];
            const container = document.getElementById('active-clip-content');
            container.innerHTML = `
                <div class="clip-card">
                    <div class="clip-header">
                        <span class="pill active">${clip.platform}</span>
                        <span class="pill">${clip.emotion}</span>
                        <span class="pill">${clip.trigger}</span>
                        <span class="pill">⭐ ${clip.viralScore}/10</span>
                    </div>
                    <span class="big-ts">${clip.segment.timestamp}</span>
                    <div class="box">
                        <strong>${clip.hookText}</strong><br>
                        <span style="color:#888;font-size:0.8rem">${clip.subHook}</span>
                    </div>
                    <p style="font-size:0.85rem;color:#aaa">${clip.whyViral}</p>

                    <div class="sub-tabs">
                        <div class="sub-tab active" onclick="showTab(this,'script-${clip.id}')">SCRIPT</div>
                        <div class="sub-tab" onclick="showTab(this,'captions-${clip.id}')">CAPTIONS</div>
                        <div class="sub-tab" onclick="showTab(this,'caption-${clip.id}')">POST CAPTION</div>
                        <div class="sub-tab" onclick="showTab(this,'capcut-${clip.id}')">CAPCUT</div>
                    </div>

                    <div id="script-${clip.id}" class="tab-content active">
                        <pre>${clip.segment.text}</pre>
                        <button class="btn btn-secondary" onclick='copyText(${JSON.stringify(clip.segment.text)})'>📋 COPY SCRIPT</button>
                    </div>
                    <div id="captions-${clip.id}" class="tab-content">
                        <pre>${clip.captions.join('\n')}</pre>
                        <button class="btn btn-secondary" onclick='copyText(${JSON.stringify(clip.captions.join("\n"))})'>📋 COPY CAPTIONS</button>
                    </div>
                    <div id="caption-${clip.id}" class="tab-content">
                        <pre>${clip.instagramCaption}\n\n${clip.hashtags.map(h => '#' + h).join(' ')}</pre>
                        <button class="btn btn-secondary" onclick='copyText(${JSON.stringify(clip.instagramCaption + " " + clip.hashtags.map(h => "#" + h).join(" "))})'>📋 COPY CAPTION</button>
                    </div>
                    <div id="capcut-${clip.id}" class="tab-content">
                        <pre>${clip.capcut}</pre>
                    </div>

                    <p style="font-size:0.75rem;color:#888;margin-top:15px">📅 Best post time: ${clip.bestPostTime}<br>💡 ${clip.platformTip}</p>

                    <div class="box" style="margin-top:15px">
                        <strong>📱 HOW TO GET THIS CLIP:</strong>
                        <ol style="font-size:0.8rem;color:#ccc;padding-left:20px;margin:10px 0">
                            <li>Play the video, skip to <strong style="color:var(--accent)">${clip.segment.timestamp.split(' - ')[0]}</strong></li>
                            <li>Start your phone's screen recorder (with audio on)</li>
                            <li>Stop recording at <strong style="color:var(--accent)">${clip.segment.timestamp.split(' - ')[1]}</strong></li>
                            <li>Upload that recording below</li>
                        </ol>
                    </div>

                    <label style="margin-top:10px">Upload Your Screen Recording</label>
                    <input type="file" accept="video/*" id="upload-input-${clip.id}" style="margin-bottom:10px">

                    <button class="btn btn-primary" onclick="uploadClip(${state.currentClipIdx})" id="gen-btn-${clip.id}">🎬 ADD CAPTIONS & CONVERT</button>
                    <div id="clip-output-${clip.id}"></div>
                </div>
            `;
        }

        function showTab(el, id) {
            const parent = el.closest('.clip-card');
            parent.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
            parent.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        async function uploadClip(idx) {
            const clip = state.clips[idx];
            const fileInput = document.getElementById(`upload-input-${clip.id}`);
            const btn = document.getElementById(`gen-btn-${clip.id}`);
            const output = document.getElementById(`clip-output-${clip.id}`);

            if (!fileInput.files || !fileInput.files[0]) {
                return alert("Choose your screen recording file first");
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> UPLOADING...';
            output.innerHTML = '<div class="progress-container"><div class="progress-fill" style="width:10%"></div></div><p style="font-size:0.75rem;color:#888;margin-top:5px">Uploading video...</p>';

            try {
                const formData = new FormData();
                formData.append('video', fileInput.files[0]);
                formData.append('captions', JSON.stringify(clip.captions));
                formData.append('hookText', clip.hookText);
                formData.append('subHook', clip.subHook);

                const res = await fetch(`${BACKEND_URL}/process-upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (!data.success || !data.jobId) {
                    throw new Error(data.error || 'Failed to start job');
                }

                await pollJobStatus(data.jobId, output, btn, '🎬 ADD CAPTIONS & CONVERT');

            } catch (e) {
                output.innerHTML = `<div class="box" style="color:#ff4444">❌ ${e.message || 'Connection failed to backend'}</div>`;
                btn.disabled = false;
                btn.innerHTML = '🎬 ADD CAPTIONS & CONVERT';
            }
        }

        function pollJobStatus(jobId, output, btn, btnLabel) {
            return new Promise((resolve) => {
                const interval = setInterval(async () => {
                    try {
                        const res = await fetch(`${BACKEND_URL}/status/${jobId}`);
                        const job = await res.json();

                        if (job.status === 'completed') {
                            clearInterval(interval);
                            const videoUrl = `${BACKEND_URL}${job.downloadUrl}`;
                            output.innerHTML = `
                                <div class="box">
                                    ✅ Clip ready!<br>
                                    <a href="${videoUrl}" download style="color:var(--accent)">⬇️ DOWNLOAD VIDEO</a>
                                </div>`;
                            btn.disabled = false;
                            btn.innerHTML = btnLabel;
                            resolve();
                        } else if (job.status === 'error') {
                            clearInterval(interval);
                            output.innerHTML = `<div class="box" style="color:#ff4444">❌ ${job.error || 'Generation failed'}</div>`;
                            btn.disabled = false;
                            btn.innerHTML = btnLabel;
                            resolve();
                        } else {
                            const pct = job.progress || 10;
                            output.innerHTML = `<div class="progress-container"><div class="progress-fill" style="width:${pct}%"></div></div><p style="font-size:0.75rem;color:#888;margin-top:5px">${job.step || 'Processing...'}</p>`;
                        }
                    } catch (e) {
                        clearInterval(interval);
                        output.innerHTML = `<div class="box" style="color:#ff4444">❌ Lost connection while checking status</div>`;
                        btn.disabled = false;
                        btn.innerHTML = btnLabel;
                        resolve();
                    }
                }, 3000);
            });
        }

        function saveToHistory(title, videoId, clipCount) {
            const history = JSON.parse(localStorage.getItem('clip_history') || '[]');
            history.unshift({ title, videoId, clipCount, date: new Date().toISOString() });
            localStorage.setItem('clip_history', JSON.stringify(history.slice(0, 20)));
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('clip_history') || '[]');
            const list = document.getElementById('history-list');
            if (history.length === 0) {
                list.innerHTML = '<p style="color:#888">No history yet</p>';
                return;
            }
            list.innerHTML = history.map(h => `
                <div class="box">
                    <strong>${h.title}</strong><br>
                    <span style="font-size:0.75rem;color:#888">${h.clipCount} clips · ${new Date(h.date).toLocaleDateString()}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
